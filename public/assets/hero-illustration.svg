<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 480" width="720" height="480" role="img" aria-labelledby="ceni-hero-title" class="decorative-illustration" color="#1B1F5A">
  <title id="ceni-hero-title">Ilustración decorativa: espacios conectados por una red de nodos</title>
  <!-- spaces (abstract rounded buildings) -->
  <rect x="90" y="210" width="150" height="190" rx="18" fill="#ECEDF5" stroke="currentColor" stroke-width="3"/>
  <path d="M145 400v-50a20 20 0 0 1 40 0v50" fill="#FFFFFF" stroke="currentColor" stroke-width="3" stroke-linejoin="round"/>
  <rect x="300" y="160" width="180" height="240" rx="22" fill="#FFFFFF" stroke="currentColor" stroke-width="3"/>
  <rect x="332" y="202" width="116" height="12" rx="6" fill="#ECEDF5"/>
  <rect x="332" y="230" width="86" height="12" rx="6" fill="#ECEDF5"/>
  <path d="M363 400v-44a19 19 0 0 1 38 0v44" fill="#F6EFD9" stroke="currentColor" stroke-width="3" stroke-linejoin="round"/>
  <rect x="530" y="250" width="120" height="150" rx="16" fill="#F6EFD9" stroke="currentColor" stroke-width="3"/>
  <path d="M572 400v-36a16 16 0 0 1 32 0v36" fill="#FFFFFF" stroke="currentColor" stroke-width="3" stroke-linejoin="round"/>
  <!-- ground -->
  <line x1="56" y1="400" x2="664" y2="400" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
  <!-- connecting network -->
  <g stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round">
    <path d="M80 120c34 4 60 12 90 20"/>
    <path d="M170 140c38-14 62-24 100-30"/>
    <path d="M270 110c40-16 80-33 120-40"/>
    <path d="M390 70c30-2 56 8 85 20"/>
    <path d="M475 90c24 14 44 32 65 50"/>
    <path d="M540 140c22 12 42 26 60 40"/>
    <path d="M660 110c-18 22-38 48-60 70"/>
    <path d="M170 140c-6 24-8 46-6 70"/>
    <path d="M270 110c12 18 30 36 52 50"/>
    <path d="M600 180c-4 24-8 46-12 70"/>
  </g>
  <!-- outline nodes -->
  <g fill="#FFFFFF" stroke="currentColor" stroke-width="3">
    <circle cx="80" cy="120" r="8"/>
    <circle cx="270" cy="110" r="14"/>
    <circle cx="390" cy="70" r="11"/>
    <circle cx="540" cy="140" r="12"/>
    <circle cx="660" cy="110" r="7"/>
  </g>
  <!-- solid gold nodes -->
  <g fill="var(--ceni-gold, #C9A227)">
    <circle cx="170" cy="140" r="10"/>
    <circle cx="475" cy="90" r="8"/>
    <circle cx="600" cy="180" r="9"/>
    <circle cx="330" cy="130" r="4"/>
    <circle cx="505" cy="152" r="4"/>
  </g>
  <!-- small accents on spaces -->
  <circle cx="215" cy="238" r="5" fill="var(--ceni-gold, #C9A227)"/>
  <circle cx="447" cy="186" r="5" fill="var(--ceni-gold, #C9A227)"/>
  <circle cx="556" cy="274" r="4" fill="var(--ceni-gold, #C9A227)"/>
</svg>
